apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: app-db
  namespace: agente-ingles
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  storage:
    size: 10Gi
    storageClass: longhorn
  bootstrap:
    initdb:
      database: agente_ingles
      owner: agente
      secret:
        name: app-db-user
  monitoring:
    enablePodMonitor: false
