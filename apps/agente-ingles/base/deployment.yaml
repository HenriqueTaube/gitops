apiVersion: apps/v1
kind: Deployment
metadata:
  name: agente-ingles
  namespace: agente-ingles
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: agente-ingles
  template:
    metadata:
      labels:
        app: agente-ingles
    spec:
      containers:
        - name: app
          image: agente-ingles:latest
          envFrom:
            - secretRef:
                name: agente-ingles-app
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
