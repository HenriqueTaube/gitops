apiVersion: v1
kind: Pod
metadata:
  name: wireguard-data-copy
  namespace: wireguard
spec:
  restartPolicy: Never
  containers:
    - name: copy
      image: alpine:3.22
      command: ["/bin/sh", "-c", "sleep 36000"]
      volumeMounts:
        - name: new-data
          mountPath: /longhorn
  volumes:
    - name: new-data
      persistentVolumeClaim:
        claimName: wireguard-longhorn
