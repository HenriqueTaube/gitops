apiVersion: apps/v1
kind: Deployment
metadata:
  name: orcamentos-api
  namespace: orcamentos
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker
      containers:
        - name: orcamentos-api
          image: 192.168.1.54:3000/henrique/orcamentos-api:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: orcamentos-openai
                  key: OPENAI_API_KEY
            - name: APP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: orcamentos-openai
                  key: APP_USERNAME
            - name: APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orcamentos-openai
                  key: APP_PASSWORD
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: orcamentos-openai
                  key: SESSION_SECRET
            - name: DATA_DIR
              value: /data/history
            - name: OPENAI_MODEL
              value: gpt-5.4
