  name: codex-api
  namespace: codex
spec:
  template:
    spec:
      containers:
        - name: codex
          image: 192.168.1.191:3000/henrique/codex:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: codex-secret
