apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: flux-system
spec:
  values:
    deployment:
      replicas: 2

    ingressClass:
      enabled: true
      isDefaultClass: false
      name: traefik

    providers:
      kubernetesIngress:
        enabled: true
        ingressClass: traefik
        publishedService:
          enabled: true

    service:
      enabled: true
      single: true
      type: LoadBalancer
      spec:
        loadBalancerIP: 192.168.1.194
        allocateLoadBalancerNodePorts: false
        externalTrafficPolicy: Cluster

    ports:
      web:
        port: 80
        expose:
          default: true
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true

      websecure:
        port: 443
        expose:
          default: true
        http:
          tls:
            enabled: true

      traefik:
        expose:
          default: false

    logs:
      general:
        level: INFO
      access:
        enabled: true

    api:
      dashboard: true

