apiVersion: v1
kind: Pod
metadata:
  name: longhorn-test-prox
  namespace: default
spec:
  nodeSelector:
    kubernetes.io/hostname: worker-prox
  containers:
    - name: test
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: longhorn-test-prox
